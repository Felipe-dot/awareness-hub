{% extends "journal/layout.html" %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-5">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="fw-bold">Welcome Back</h2>
                    <p class="text-muted">Log in to continue your journey</p>
                </div>
                
                {% if message %}
                    <div class="alert alert-danger rounded-3">{{ message }}</div>
                {% endif %}

                <form action="{% url 'login' %}" method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted small fw-bold text-uppercase">Username</label>
                        <input type="text" class="form-control form-control-lg" name="username" id="username" placeholder="Username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted small fw-bold text-uppercase">Password</label>
                        <input type="password" class="form-control form-control-lg" name="password" id="password" placeholder="Password" required>
                    </div>
                    <button class="btn btn-primary w-100 btn-lg mb-3" type="submit">Log In</button>
                    <div class="text-center text-muted small">
                        Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none fw-bold">Sign up here</a>.
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
