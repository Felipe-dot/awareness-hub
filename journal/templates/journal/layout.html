<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AwarenessHub</title>
    <script>
        (function() {
            try {
                var t = localStorage.getItem('ah-theme');
                if (t === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
            } catch(e) {}
        })();
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root,
        [data-theme="light"] {
            --bg-page:        #f7f9fc;
            --bg-card:        #ffffff;
            --bg-navbar:      rgba(255,255,255,0.85);
            --text-primary:   #1a1e23;
            --text-muted:     #6c757d;
            --border-color:   rgba(0,0,0,0.05);
            --border-input:   #e2e8f0;
            --shadow-card:    0 10px 30px rgba(0,0,0,0.04);
            --toggle-bg:      #e2e8f0;
            --toggle-icon:    "☀️";
            --progress-track: #f0f2ff;
        }

        [data-theme="dark"] {
            --bg-page:        #0f1117;
            --bg-card:        #1a1d27;
            --bg-navbar:      rgba(15,17,23,0.9);
            --text-primary:   #e8eaf6;
            --text-muted:     #8892a4;
            --border-color:   rgba(255,255,255,0.06);
            --border-input:   #2d3042;
            --shadow-card:    0 10px 30px rgba(0,0,0,0.3);
            --toggle-bg:      #2d3042;
            --toggle-icon:    "🌙";
            --progress-track: #1e2235;
        }

        *  { transition: background-color .25s ease, color .25s ease, border-color .25s ease, box-shadow .25s ease; }
        body {
            background-color: var(--bg-page);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
        }
        .text-muted { color: var(--text-muted) !important; }

        .navbar {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            background-color: var(--bg-navbar) !important;
            border-bottom: 1px solid var(--border-color);
        }
        .navbar-brand { font-weight: 700; color: #4361ee !important; letter-spacing: -0.5px; }
        .nav-link { color: var(--text-primary) !important; }

        .card {
            border-radius: 16px;
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .btn-primary {
            background-color: #4361ee;
            border: none;
            border-radius: 8px;
            padding: 10px 24px;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #3f37c9;
            box-shadow: 0 6px 15px rgba(67,97,238,0.3);
            transform: translateY(-1px);
        }

        .content-container { margin-top: 30px; margin-bottom: 50px; }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid var(--border-input);
            padding: 12px;
            background-color: var(--bg-card);
            color: var(--text-primary);
        }
        .form-control:focus, .form-select:focus {
            border-color: #4361ee;
            box-shadow: 0 0 0 0.25rem rgba(67,97,238,0.25);
            background-color: var(--bg-card);
            color: var(--text-primary);
        }
        [data-theme="dark"] textarea::placeholder,
        [data-theme="dark"] input::placeholder { color: var(--text-muted); }

        #theme-toggle {
            background: var(--toggle-bg);
            border: none;
            border-radius: 999px;
            width: 42px;
            height: 42px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.15rem;
            cursor: pointer;
            transition: background .25s, transform .2s;
            padding: 0;
        }
        #theme-toggle:hover { transform: scale(1.1); }

        [data-theme="dark"] .progress { background: var(--progress-track) !important; }

        [data-theme="dark"] .alert-info {
            background-color: rgba(67,97,238,0.15) !important;
            color: #90a8ff !important;
            border-color: transparent !important;
        }

        [data-theme="dark"] .badge.bg-secondary { background-color: #2d3042 !important; }
        [data-theme="dark"] .badge.bg-light { background-color: #2d3042 !important; color: var(--text-primary) !important; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">
                <span class="fs-4">✨</span> AwarenessHub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'index' %}">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'journal' %}">Journal</a></li>
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'sessions' %}">Therapy</a></li>
                        <li class="nav-item ms-lg-3">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3" href="{% url 'logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'login' %}">Log In</a></li>
                        <li class="nav-item ms-lg-2"><a class="btn btn-primary btn-sm rounded-pill px-4" href="{% url 'register' %}">Sign Up</a></li>
                    {% endif %}
                    <li class="nav-item ms-lg-3">
                        <button id="theme-toggle" aria-label="Toggle theme" title="Toggle dark / light mode">🌙</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container content-container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            var html    = document.documentElement;
            var btn     = document.getElementById('theme-toggle');
            var ICONS   = { light: '🌙', dark: '☀️' };

            function applyTheme(theme) {
                html.setAttribute('data-theme', theme);
                btn.textContent = ICONS[theme];
                try { localStorage.setItem('ah-theme', theme); } catch(e) {}
            }

            applyTheme(html.getAttribute('data-theme') || 'light');

            btn.addEventListener('click', function() {
                var current = html.getAttribute('data-theme') || 'light';
                applyTheme(current === 'light' ? 'dark' : 'light');
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
