<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AwarenessHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            background-color: #f7f9fc; 
            color: #1a1e23; 
            font-family: 'Inter', sans-serif; 
        }
        .navbar {
            backdrop-filter: blur(10px);
            background-color: rgba(255, 255, 255, 0.8) !important;
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }
        .navbar-brand { font-weight: 700; color: #4361ee !important; letter-spacing: -0.5px; }
        .card { 
            border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.03); 
            border: 1px solid rgba(0,0,0,0.05); 
            margin-bottom: 24px; 
            background: #fff;
        }
        .btn-primary { 
            background-color: #4361ee; 
            border: none; 
            border-radius: 8px; 
            padding: 10px 24px; 
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { 
            background-color: #3f37c9; 
            box-shadow: 0 6px 15px rgba(67, 97, 238, 0.3); 
            transform: translateY(-1px);
        }
        .content-container { margin-top: 30px; margin-bottom: 50px; }
        .form-control, .form-select { border-radius: 8px; border: 1px solid #e2e8f0; padding: 12px; }
        .form-control:focus, .form-select:focus { border-color: #4361ee; box-shadow: 0 0 0 0.25rem rgba(67, 97, 238, 0.25); }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">
                <span class="fs-4">✨</span> AwarenessHub
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center">
                    {% if user.is_authenticated %}
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'index' %}">Dashboard</a></li>
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'journal' %}">Journal</a></li>
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'sessions' %}">Therapy</a></li>
                        <li class="nav-item ms-lg-3">
                            <a class="btn btn-outline-danger btn-sm rounded-pill px-3" href="{% url 'logout' %}">Logout</a>
                        </li>
                    {% else %}
                        <li class="nav-item"><a class="nav-link fw-medium" href="{% url 'login' %}">Log In</a></li>
                        <li class="nav-item ms-lg-2"><a class="btn btn-primary btn-sm rounded-pill px-4" href="{% url 'register' %}">Sign Up</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container content-container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
